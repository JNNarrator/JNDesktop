name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "jntool/**"
      - ".github/workflows/build-windows-installer.yml"

jobs:
  build:
    name: Build JNTool Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Inno Setup
        shell: powershell
        run: |
          # 核心依赖：Inno Setup 负责把 Flutter Release 目录编译成 Windows 安装包。
          choco install innosetup --yes --no-progress

      - name: Build installer
        shell: powershell
        working-directory: jntool
        run: |
          $ErrorActionPreference = "Stop"
          $flutterCommand = Get-Command flutter -ErrorAction Stop
          $isccCommand = Get-Command ISCC.exe -ErrorAction SilentlyContinue
          Write-Host "Flutter path: $($flutterCommand.Source)"
          if ($isccCommand) {
            Write-Host "Inno Setup path: $($isccCommand.Source)"
          } else {
            Write-Host "Inno Setup is not on PATH; installer script will check the default install directories."
          }
          # CI 使用 stable 通道重新解析依赖，避免本地 master 锁文件约束阻塞云端构建。
          Remove-Item pubspec.lock -ErrorAction SilentlyContinue
          # 核心流程：复用仓库内脚本，确保本地 Windows 与 CI 的打包逻辑一致。
          powershell -NoProfile -ExecutionPolicy Bypass -File .\installer\windows\build_windows_installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: JNToolSetup-1.0.0
          path: jntool/dist/windows/JNToolSetup-1.0.0.exe
          if-no-files-found: error
